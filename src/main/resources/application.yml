server:
  port: ${PORT:8080} # Ahora corremos en el 8080 porque somos la entrada principal (Gateway)

spring:
  application:
    name: dgac-ms-usuarios
    
  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-aged-cloud-aqdbd64c-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_t9MGlKdf0DTv}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  # ¡EL MAPA DE RUTAS EXPLÍCITO DEL GATEWAY!
  cloud:
    gateway:
      mvc:
        routes:
       
          - id: ruta-pilotos
            uri: lb://DGAC-MS-PILOTOS # Apunta al nombre en Eureka (Load Balancer)
            predicates:
              - Path=/dgac-ms-pilotos/** # Si la URL de entrada tiene esto...
            filters:
              - StripPrefix=1 # ...le quito esa primera parte y lo mando al microservicio
          
         
          - id: ruta-planes-vuelo
            uri: lb://DGAC-MS-PLANES-VUELO 
            predicates:
              - Path=/dgac-ms-planes-vuelo/**
            filters:
              - StripPrefix=1
          
          - id: ruta-drones
            uri: lb://DGAC-MS-DRONES
            predicates:
              - Path=/dgac-ms-drones/**
            filters:
              - StripPrefix=1

          - id: ruta-restricciones
            uri: lb://DGAC-MS-RESTRICCIONES-AEREAS
            predicates:
              - Path=/dgac-ms-restricciones-aereas/**
            filters:
              - StripPrefix=1

          - id: ruta-empresas
            uri: lb://DGAC-MS-EMPRESAS-MANDANTES
            predicates:
              - Path=/dgac-ms-empresas-mandantes/**
            filters:
              - StripPrefix=1
          
          - id: ruta-reportes
            uri: lb://DGAC-MS-REPORTES
            predicates:
              - Path=/dgac-ms-reportes/**
            filters:
              - StripPrefix=1

          - id: ruta-empresas-proveedoras
            uri: lb://DGAC-MS-EMPRESAS-PROVEEDORAS
            predicates:
              - Path=/dgac-ms-empresas-proveedoras/**
            filters:
              - StripPrefix=1

          - id: ruta-incidencias
            uri: lb://DGAC-MS-INCIDENCIAS
            predicates:
              - Path=/dgac-ms-incidencias/**
            filters:
              - StripPrefix=1
              
          - id: ruta-seguros
            uri: lb://DGAC-MS-SEGUROS
            predicates:
              - Path=/dgac-ms-seguros/**
            filters:
              - StripPrefix=1

eureka:
  instance:
    hostname: localhost
    preferIpAddress: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8080/eureka/}
