server:
  port: ${PORT:8080} # Ahora corremos en el 8080 porque somos la entrada principal (Gateway)

spring:
  application:
    name: dgac-ms-usuarios
    
  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-aged-cloud-aqdbd64c-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_t9MGlKdf0DTv}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  # Esta es la magia del Gateway que no estaba en tu archivo antiguo
  cloud:
    gateway:
      mvc:
        discovery:
          locator:
            enabled: true 
            lower-case-service-id: true

eureka:
  instance:
    hostname: localhost
    preferIpAddress: true
  client:
    # Ahora somos el servidor, así que nos auto-registramos
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8080/eureka/}