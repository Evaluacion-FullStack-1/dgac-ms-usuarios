server:
  # Railway/Render inyectarán su propio puerto aquí. Si no existe (en PC local), usará 8081.
  port: ${PORT:8081}

spring:
  application:
    name: dgac-ms-usuarios # Este nombre es CRUCIAL, el Gateway lo usará para buscarlo
    
  # Conexión a la base de datos de Neon parametrizada con variables de entorno
  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-aged-cloud-aqdbd64c-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_t9MGlKdf0DTv}
    driver-class-name: org.postgresql.Driver
    
  # Configuración de JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true